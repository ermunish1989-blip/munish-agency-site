<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-H">
    <title>Secure Briefing | Munish Kumar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-serif { font-family: 'Playfair Display', serif; }
        .text-gold { color: #c5a059; }
        .bg-gold { background-color: #c5a059; }
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto border-b border-slate-800">
        <div class="text-xl font-bold tracking-widest text-white">
            MUNISH <span class="text-gold">KUMAR</span>
        </div>
        <div class="hidden md:flex space-x-8 text-xs uppercase tracking-widest font-medium text-slate-400">
            <a href="/index.html" class="hover:text-gold transition">Home</a>
            <a href="/about.html" class="hover:text-gold transition">About</a>
            <a href="/services" class="hover:text-gold transition">Protocols</a>
            <a href="/markets" class="hover:text-gold transition">Global Hub</a>
            <a href="/contact.html" class="text-gold">Briefing</a>
        </div>
    </nav>

    <section class="px-8 py-24 max-w-3xl mx-auto">
        <div class="text-center mb-16">
            <span class="text-gold uppercase tracking-[0.3em] text-xs font-bold mb-6 block">Executive Intake</span>
            <h1 class="text-5xl font-bold text-white mb-6">Secure a Briefing</h1>
            <p class="text-slate-400 text-lg">Direct executive advisory for businesses needing structural growth audits.</p>
        </div>

        <div class="glass-card p-10 rounded-none border-t-4 border-gold">
            <form class="grid gap-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">Full Name</label>
                        <input type="text" class="w-full bg-slate-900 border border-slate-800 px-4 py-3 text-white focus:border-gold outline-none transition" placeholder="Executive Name">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">Corporate Email</label>
                        <input type="email" class="w-full bg-slate-900 border border-slate-800 px-4 py-3 text-white focus:border-gold outline-none transition" placeholder="email@company.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">Target Market</label>
                    <select class="w-full bg-slate-900 border border-slate-800 px-4 py-3 text-white focus:border-gold outline-none transition">
                        <option>UAE / GCC</option>
                        <option>USA</option>
                        <option>UK</option>
                        <option>India</option>
                        <option>Australia</option>
                        <option>Other Global</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-widest text-slate-500 mb-2">Growth Objective</label>
                    <textarea rows="4" class="w-full bg-slate-900 border border-slate-800 px-4 py-3 text-white focus:border-gold outline-none transition" placeholder="Describe your structural bottlenecks..."></textarea>
                </div>
                <button type="submit" class="bg-gold text-black py-4 font-bold uppercase tracking-widest hover:bg-yellow-600 transition">
                    Submit Briefing Request
                </button>
            </form>
        </div>
    </section>

    <footer class="py-12 border-t border-slate-800 text-center text-slate-600 text-xs uppercase tracking-widest">
        <p>© 2026 MUNISH KUMAR ARCHITECTURAL GROWTH. All Rights Reserved.</p>
    </footer>

</body>
</html>
